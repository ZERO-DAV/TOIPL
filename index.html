      if(iter<maxIter){
        const t=iter/maxIter;
        if(p.colorScheme==='fire'){ r=Math.round(lerp(0,255,Math.min(t*3,1))); g=Math.round(lerp(0,255,Math.min(Math.max(t*3-1,0),1))); b=Math.round(lerp(0,255,Math.min(Math.max(t*3-2,0),1))); }
        else if(p.colorScheme==='ocean'){ r=0; g=Math.round(t*160); b=Math.round(lerp(100,255,t)); }
        else { r=Math.round(Math.sin(t*6+0)*127+128); g=Math.round(Math.sin(t*6+2)*127+128); b=Math.round(Math.sin(t*6+4)*127+128); }
      }
      for(let di=0;di<2;di++) for(let dj=0;dj<2;dj++){
        const idx=((py+dj)*CW+(px+di))*4;
        d[idx]=r; d[idx+1]=g; d[idx+2]=b; d[idx+3]=255;
      }
    }
    ctx.putImageData(imgData,0,0); s.imgCache=imgData;
    ctx.fillStyle='#ffffff22'; ctx.font='10px var(--font-mono)'; ctx.textAlign='end'; ctx.fillText('انقر للتكبير',CW-6,CH-6);
  },
  readouts(s){ return [['المركز Re',s.cx.toFixed(5)],['المركز Im',s.cy.toFixed(5)],['مستوى التكبير',fmt(0.003/s.zoom,0)+'×']]; }
});

/* ---------- 24) مخطط التشعب (فوضى لوجستية) ---------- */
defineSim({
  id:'bifurcation', category:'chaos', title:'مخطط التشعب — الطريق إلى الفوضى',
  tagline:'المعادلة اللوجستية: من التقارب إلى مضاعفة الدورة إلى الفوضى الكاملة.',
  description:'المعادلة اللوجستية x_{n+1}=rx_n(1-x_n) بسيطة لكن سلوكها غني. عند r<3 يتقارب النظام لنقطة واحدة. ثم تتشعب إلى دورتين عند r≈3، ثم أربع... وهكذا في تشعبات متتالية تكثر بسرعة متزايدة حتى يصبح النظام فوضويًا عند r≈3.57.',
  formula:'x_{n+1} = r · x_n · (1 − x_n)',
  laws:[
    '<b>ثابت فايغنباوم δ≈4.669:</b> نسبة الفترات بين التشعبات المتتالية ثابتة، وهو نفس الثابت في أنواع مختلفة من الأنظمة.',
    '<b>عالمية الفوضى:</b> مسار التشعب هذا يظهر في المعادلات الفيزيائية والبيولوجية والكيميائية.',
  ],
  params:[
    {key:'rMin', label:'r ابتداءً من', min:2,max:3.5,step:0.01,value:2.4,dec:2},
    {key:'rMax', label:'r حتى', min:3,max:4,step:0.01,value:4,dec:2},
  ],
  init(){ return {img:null, dirty:true}; },
  step(s){ s.dirty=true; },
  draw(ctx,s,p,{CW,CH}){
    if(!s.dirty && s.img){ ctx.putImageData(s.img,0,0); return; }
    s.dirty=false;
    ctx.fillStyle='#060a06'; ctx.fillRect(0,0,CW,CH);
    const rMin=p.rMin, rMax=p.rMax;
    const imgData=ctx.createImageData(CW,CH);
    const d=imgData.data;
    for(let px=0;px<CW;px++){
      const r=rMin+(rMax-rMin)*(px/CW);
      let x=0.5;
      for(let i=0;i<300;i++) x=r*x*(1-x);
      for(let i=0;i<200;i++){
        x=r*x*(1-x);
        const py=Math.floor((1-x)*CH);
        if(py>=0&&py<CH){ const idx=(py*CW+px)*4; d[idx]=140; d[idx+1]=255; d[idx+2]=140; d[idx+3]=Math.min(d[idx+3]+30,180); }
      }
    }
    ctx.putImageData(imgData,0,0); s.img=imgData;
    ctx.strokeStyle='#2a3a28'; ctx.lineWidth=1; ctx.strokeRect(0,0,CW,CH);
    ctx.fillStyle='#5e6b5c'; ctx.font='9px var(--font-mono)'; ctx.textAlign='center';
    ctx.fillText(rMin.toFixed(2),16,CH-4); ctx.fillText(rMax.toFixed(2),CW-16,CH-4);
    ctx.fillText('r →',CW/2,CH-4);
    [3,3.45,3.57].forEach(rv=>{ if(rv>rMin&&rv<rMax){ const px=CW*(rv-rMin)/(rMax-rMin); ctx.strokeStyle='#ffffff22'; ctx.lineWidth=1; ctx.setLineDash([3,5]); ctx.beginPath(); ctx.moveTo(px,0); ctx.lineTo(px,CH); ctx.stroke(); ctx.setLineDash([]); ctx.fillStyle='#ffffff44'; ctx.fillText(rv,px,12); } });
  },
  readouts(s,p){ return [['نطاق r',p.rMin.toFixed(2)+'→'+p.rMax.toFixed(2)],['بداية الفوضى','r≈3.57'],['ثابت فايغنباوم','δ≈4.669']]; }
});

/* ---------- 25) آليات النمو وأوتوماتا الخلايا (لعبة كونواي) ---------- */
defineSim({
  id:'gameOfLife', category:'chaos', title:'لعبة الحياة — الأوتوماتا الخلوية',
  tagline:'قواعد بسيطة جدًا تنتج سلوكًا معقدًا وأنماطًا ذاتية التنظيم.',
  description:'قواعد لعبة كونواي: خلية حية تبقى إذا كانت لها 2 أو 3 جارات حية، وتموت خلافًا لذلك. خلية ميتة تنبعث إذا كانت لها 3 جارات حية بالضبط. ومن هذه القواعد الثلاث البسيطة تنبثق سفن وذبذبات ومدافع وأنماط عشوائية لا تنتهي.',
  formula:'B3/S23 — ولادة عند 3 جارات، بقاء عند 2 أو 3',
  laws:[
    '<b>الظهور (Emergence):</b> خصائص معقدة تظهر من تفاعلات محلية بسيطة دون أي تخطيط مركزي.',
    '<b>الحوسبة الكونية:</b> لعبة الحياة إدارة تورنج-كاملة — يمكن بناء حاسوب كامل داخلها نظريًا.',
  ],
  hint:'انقر لرسم خلايا حية، واسحب لرسم خط',
  params:[
    {key:'speed', label:'سرعة الأجيال', min:1,max:20,step:1,value:8,dec:0},
    {key:'preset', label:'نمط ابتدائي', type:'choice', value:'random',
     choices:[{value:'random',label:'عشوائي'},{value:'glider',label:'طائرة ورقية'},{value:'rpentomino',label:'R-pentomino'}]},
    {key:'wrap', label:'حواف دائرية', type:'bool', value:true},
  ],
  init(p,{CW,CH}){
    const cell=8, cols=Math.floor(CW/cell), rows=Math.floor(CH/cell);
    const grid=new Uint8Array(cols*rows);
    if(p.preset==='random'){ for(let i=0;i<grid.length;i++) if(Math.random()<0.32) grid[i]=1; }
    else if(p.preset==='glider'){ const cx=Math.floor(cols/2), cy=Math.floor(rows/2); [[1,0],[2,1],[0,2],[1,2],[2,2]].forEach(([dx,dy])=>{ if(cx+dx<cols&&cy+dy<rows) grid[(cy+dy)*cols+(cx+dx)]=1; }); }
    else { const cx=Math.floor(cols/2), cy=Math.floor(rows/2); [[0,-1],[1,0],[-1,1],[0,1],[1,1]].forEach(([dx,dy])=>{ if(cx+dx>=0&&cx+dx<cols&&cy+dy>=0&&cy+dy<rows) grid[(cy+dy)*cols+(cx+dx)]=1; }); }
    return {grid, next:new Uint8Array(cols*rows), cols, rows, cell, gen:0, tick:0, drawing:false, currentPreset:p.preset};
  },
  onDown(s,p,x,y){ const c=Math.floor(x/s.cell), r=Math.floor(y/s.cell); if(c>=0&&c<s.cols&&r>=0&&r<s.rows){ s.grid[r*s.cols+c]=1-s.grid[r*s.cols+c]; } s.drawing=true; },
  onMove(s,p,x,y){ if(s.drawing){ const c=Math.floor(x/s.cell), r=Math.floor(y/s.cell); if(c>=0&&c<s.cols&&r>=0&&r<s.rows) s.grid[r*s.cols+c]=1; } },
  onUp(s){ s.drawing=false; },
  step(s,p,dt){
    if(s.currentPreset!==p.preset){ Object.assign(s,this.init(p,{CW:s.cols*s.cell,CH:s.rows*s.cell})); return; }
    s.tick+=dt*p.speed;
    if(s.tick<0.05) return;
    s.tick=0; s.gen++;
    const {grid,next,cols,rows}=s; const wrap=p.wrap; next.fill(0);
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
      let n=0;
      for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
        if(!dr&&!dc) continue;
        let nr=r+dr, nc=c+dc;
        if(p.wrap){ nr=(nr+rows)%rows; nc=(nc+cols)%cols; }
        if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&grid[nr*cols+nc]) n++;
      }
      const alive=grid[r*cols+c];
      next[r*cols+c]=(alive&&(n===2||n===3))||(!alive&&n===3)?1:0;
    }
    grid.set(next);
  },
  draw(ctx,s,p,{CW,CH}){
    ctx.fillStyle='#080e08'; ctx.fillRect(0,0,CW,CH);
    const {grid,cols,rows,cell}=s;
    ctx.fillStyle=hexA(App.accentHex,0.9);
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
      if(grid[r*cols+c]){ ctx.fillRect(c*cell+0.5,r*cell+0.5,cell-1,cell-1); }
    }
    ctx.strokeStyle='#1a2218'; ctx.lineWidth=0.5;
    for(let c=0;c<=cols;c++){ ctx.beginPath(); ctx.moveTo(c*cell,0); ctx.lineTo(c*cell,CH); ctx.stroke(); }
    for(let r=0;r<=rows;r++){ ctx.beginPath(); ctx.moveTo(0,r*cell); ctx.lineTo(CW,r*cell); ctx.stroke(); }
  },
  readouts(s,p){ const alive=s.grid.reduce((a,b)=>a+b,0); return [['الجيل',s.gen],['خلايا حية',alive],['كثافة',fmt(alive/s.grid.length*100,1)+'%']]; }
});

/* ═══ نهاية المحاكيات ═══ */

/* ============================================================
   4) محرّك التشغيل
   ============================================================ */
const canvas=document.getElementById('simCanvas');
const ctx=canvas.getContext('2d');
let CW=0, CH=0, DPR=1;

const App={
  currentId:null, def:null, local:{}, params:{}, paused:false,
  lastT:0, fpsAcc:0, fpsCount:0, fpsLast:0,
};

function resizeCanvas(){
  const rect=canvas.parentElement.getBoundingClientRect();
  DPR=Math.min(window.devicePixelRatio||1, 2);
  CW=Math.max(280,Math.round(rect.width));
  CH=Math.max(200,Math.round(rect.height));
  canvas.width=CW*DPR; canvas.height=CH*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resizeCanvas);

function setAccent(catId){
  const c=catById[catId];
  document.documentElement.style.setProperty('--accent', c.color);
  document.documentElement.style.setProperty('--cat-color', c.color);
  App.accentHex=c.color;
}

function buildSidebar(){
  const nav=document.getElementById('sidebar');
  nav.innerHTML='';
  CATEGORIES.forEach((cat,ci)=>{
    const sims=REGISTRY.filter(s=>s.category===cat.id);
    if(!sims.length) return;
    const group=document.createElement('div');
    group.className='cat-group'+(ci===0?' open':'');
    group.style.setProperty('--cat-color',cat.color);
    group.innerHTML=`
      <button class="cat-head">
        <span class="dot"></span>
        <span>${cat.label}</span>
        <span class="count">${sims.length}</span>
        <span class="chev"></span>
      </button>
      <div class="sim-list"></div>`;
    const head=group.querySelector('.cat-head');
    head.addEventListener('click',()=>group.classList.toggle('open'));
    const list=group.querySelector('.sim-list');
    sims.forEach(s=>{
      const b=document.createElement('button');
      b.className='sim-btn'; b.textContent=s.title; b.dataset.id=s.id;
      b.style.setProperty('--cat-color',cat.color);
      b.addEventListener('click',()=>{ loadSim(s.id); if(window.innerWidth<=920) document.body.classList.remove('nav-open'); });
      list.appendChild(b);
    });
    nav.appendChild(group);
  });
  document.getElementById('statSims').textContent=REGISTRY.length;
}

function markActiveButton(id){
  document.querySelectorAll('.sim-btn').forEach(b=>b.classList.toggle('active', b.dataset.id===id));
}

function buildControls(def){
  const wrap=document.getElementById('controls');
  wrap.innerHTML='';
  if(!def.params || !def.params.length){
    wrap.innerHTML='<p class="desc" style="margin:0">لا توجد إعدادات قابلة للتعديل لهذه المحاكاة — راقب السلوك مباشرة.</p>';
    return;
  }
  def.params.forEach(p=>{
    const val=App.params[p.key];
    const div=document.createElement('div'); div.className='control';
    if(p.type==='bool'){
      div.innerHTML=`<div class="toggle-row"><label>${p.label}</label>
        <label class="switch"><input type="checkbox" ${val?'checked':''}><span class="track"></span></label></div>`;
      div.querySelector('input').addEventListener('change',e=>{ App.params[p.key]=e.target.checked; });
    } else if(p.type==='choice'){
      div.innerHTML=`<div class="row"><label>${p.label}</label></div><div class="btn-row"></div>`;
      const row=div.querySelector('.btn-row');
      p.choices.forEach(ch=>{
        const cb=document.createElement('button'); cb.className='chip-btn'+(val===ch.value?' active':''); cb.textContent=ch.label;
        cb.addEventListener('click',()=>{ App.params[p.key]=ch.value; row.querySelectorAll('.chip-btn').forEach(x=>x.classList.remove('active')); cb.classList.add('active'); });
        row.appendChild(cb);
      });
    } else {
      div.innerHTML=`<div class="row"><label>${p.label}</label><span class="val ltr">${fmt(val,p.dec??1)}${p.unit||''}</span></div>
        <input type="range" min="${p.min}" max="${p.max}" step="${p.step}" value="${val}">`;
      const range=div.querySelector('input'); const valSpan=div.querySelector('.val');
      range.addEventListener('input',e=>{ const v=parseFloat(e.target.value); App.params[p.key]=v; valSpan.textContent=fmt(v,p.dec??1)+(p.unit||''); });
    }
    wrap.appendChild(div);
  });
}

function buildInfo(def){
  document.getElementById('crumb').textContent=catById[def.category].label;
  document.getElementById('simTitle').textContent=def.title;
  document.getElementById('simSub').textContent=def.tagline||'';
  document.getElementById('simDesc').textContent=def.description||'';
  document.getElementById('simFormula').textContent=def.formula||'';
  const laws=document.getElementById('simLaws'); laws.innerHTML='';
  (def.laws||[]).forEach(l=>{ const li=document.createElement('li'); li.innerHTML=l; laws.appendChild(li); });
  document.getElementById('hint').textContent=def.hint||'';
}

function defaultParams(def){
  const o={};
  (def.params||[]).forEach(p=>{ o[p.key]=p.value; });
  return o;
}

function loadSim(id){
  const def=simById[id];
  if(!def) return;
  App.currentId=id; App.def=def;
  App.params=defaultParams(def);
  setAccent(def.category);
  resizeCanvas();
  App.local = def.init ? (def.init(App.params, {CW,CH}) || {}) : {};
  buildSidebar.lastId=id;
  markActiveButton(id);
  buildControls(def);
  buildInfo(def);
  location.hash=id;
  App.paused=false;
  document.getElementById('iconPlay').style.display='';
  document.getElementById('iconPause').style.display='none';
}

function renderReadouts(){
  const box=document.getElementById('readouts');
  const ro = (App.def && App.def.readouts) ? App.def.readouts(App.local, App.params) : null;
  if(!ro){ box.innerHTML=''; return; }
  box.innerHTML = ro.map(r=>`<div class="ro"><label>${r[0]}</label><b class="ltr">${r[1]}</b></div>`).join('');
}

let acc=0;
function loop(t){
  requestAnimationFrame(loop);
  if(!App.lastT) App.lastT=t;
  let dt=(t-App.lastT)/1000; App.lastT=t;
  dt=Math.min(dt,0.033);

  App.fpsAcc+=dt; App.fpsCount++;
  if(App.fpsAcc>0.5){ document.getElementById('statFps').textContent=Math.round(App.fpsCount/App.fpsAcc); App.fpsAcc=0; App.fpsCount=0; }

  if(App.def){
    if(!App.paused && App.def.step){
      const sub = App.def.substeps||1;
      for(let i=0;i<sub;i++) App.def.step(App.local, App.params, dt/sub, {CW,CH});
    }
    ctx.clearRect(0,0,CW,CH);
    if(App.def.draw) App.def.draw(ctx, App.local, App.params, {CW,CH});
    renderReadouts();
  }
}

/* أحداث المؤشر/اللمس */
function pointerPos(e){
  const r=canvas.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  return {x:cx-r.left, y:cy-r.top};
}
['pointerdown','contextmenu'].forEach(evt=>canvas.addEventListener(evt,e=>{
  e.preventDefault();
  const p=pointerPos(e);
  if(App.def && App.def.onDown) App.def.onDown(App.local, App.params, p.x, p.y, {CW,CH}, e);
}));
['pointermove'].forEach(evt=>canvas.addEventListener(evt,e=>{
  const p=pointerPos(e);
  if(App.def && App.def.onMove) App.def.onMove(App.local, App.params, p.x, p.y, {CW,CH});
}));
['pointerup','pointerleave'].forEach(evt=>canvas.addEventListener(evt,e=>{
  if(App.def && App.def.onUp) App.def.onUp(App.local, App.params);
}));

document.getElementById('btnPlay').addEventListener('click',()=>{
  App.paused=!App.paused;
  document.getElementById('iconPlay').style.display=App.paused?'':'none';
  document.getElementById('iconPause').style.display=App.paused?'none':'';
});
document.getElementById('btnReset').addEventListener('click',()=>{
  if(!App.def) return;
  App.params=defaultParams(App.def);
  App.local = App.def.init ? (App.def.init(App.params,{CW,CH})||{}) : {};
  buildControls(App.def);
});
document.getElementById('menuBtn').addEventListener('click',()=>document.body.classList.toggle('nav-open'));
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) App.lastT=0; });

/* ============================================================
   5) الإقلاع
   ============================================================ */
function boot(){
  buildSidebar();
  const want = location.hash ? location.hash.slice(1) : null;
  const startId = (want && simById[want]) ? want : (REGISTRY[0] && REGISTRY[0].id);
  if(startId) loadSim(startId);
  requestAnimationFrame(loop);
}
boot();
</script>
